# Worker / Performance
rate_limit        = 150
rate_limit_ceiling = 180
cooldown_after    = 10000
cooldown_duration = 60
timeout_seconds   = 3
max_retries       = 3
autoscale         = false

# DNS settings
upstream_dns    = 9.9.9.9:53
backup_dns      = 1.1.1.1:53
dns_retries     = 2
dns_timeout_ms  = 1500

resolve_interval_hours = 6
# TLD tiers — controls domain generation coverage
# Tier 1: Indian ccTLD family (core, highest confidence)
target_tlds_india    = .in,.co.in,.net.in,.org.in,.in.net

# Tier 2: Global high-abuse (confirmed India campaign IOCs)
target_tlds_global   = .com,.net,.org,.top,.xyz,.online,.shop,.info,.vip,.sbs,.icu,.buzz,.monster,.cfd,.lat

# Tier 3: Emerging / opt-in (high volume, situational)
target_tlds_emerging = .zip,.mov,.li,.beauty,.pics,.lol,.finance,.support

# Active tiers (comma-separated: india, global, emerging)
active_tld_tiers     = india,global

# Mutation settings
mutation_enabled      = true
mutation_character    = true
mutation_seed         = true
mutation_hashchain    = true

# Mutation TLDs — tighter focus, highest-confidence candidates
mutation_target_tlds  = .in,.co.in,.com,.net
