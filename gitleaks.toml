# ║        INFERMAL_v2  ·  gitleaks Configuration                               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
# Place this file at:  .gitleaks.toml

title = "Infermal v2 Gitleaks Config"

[extend]
  useDefault = true

# ── Allowlist: suppress known-safe patterns in offensive tooling ──────────────
[[allowlists]]
  description = "Test fixtures and mock credentials in *_test.go files"
  paths       = [ '''.*_test\.go''' ]
  regexes     = [ '''password\s*=\s*".*"''' ]

[[allowlists]]
  description = "Redis config in Setting/ — not real secrets, local dev only"
  paths       = [ '''Setting/redis\.yaml''' ]
  regexes     = [ '''password:\s+".*"''' ]

[[allowlists]]
  description = "Wordlist / keyword CSV data — not credentials"
  paths       = [ '''Engine/Input/.*\.csv''' ]

[[allowlists]]
  description = "Output NDJSON files — DNS/domain recon results, not secrets"
  paths       = [ '''Output/.*\.ndjson''' ]
